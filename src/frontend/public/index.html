<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="index.css" />
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" readonly value="0" aria-label="Calculator display" />
        <div class="buttons">
            <!-- Row 1 -->
            <button data-value="7">7</button>
            <button data-value="8">8</button>
            <button data-value="9">9</button>
            <button data-operator="/">/</button>

            <!-- Row 2 -->
            <button data-value="4">4</button>
            <button data-value="5">5</button>
            <button data-value="6">6</button>
            <button data-operator="*">*</button>

            <!-- Row 3 -->
            <button data-value="1">1</button>
            <button data-value="2">2</button>
            <button data-value="3">3</button>
            <button data-operator="-">-</button>

            <!-- Row 4 -->
            <button data-value="0">0</button>
            <button data-value=".">.</button>
            <button data-action="equals">=</button>
            <button data-operator="+">+</button>

            <!-- Row 5: Clear and √ side by side -->
            <button data-action="clear" class="btn-clear">Clear</button>
            <button data-action="sqrt" class="btn-sqrt" aria-label="Square root">√</button>
        </div>
    </div>
    <canvas id="mainCanvas" width="800" height="600"></canvas>
    <script src="index.js"></script>
</body>
</html>
